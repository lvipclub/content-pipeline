<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="halftone" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#fff" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Dark background with halftone -->
  <rect width="1200" height="630" fill="#0a1628"/>
  <rect width="1200" height="630" fill="url(#halftone)"/>

  <!-- Large bold title -->
  <text x="50" y="90" font-family="'Trebuchet MS', Impact, sans-serif" font-size="48" font-weight="900" fill="#fff" letter-spacing="1">DATA CENTER</text>
  <text x="50" y="145" font-family="'Trebuchet MS', Impact, sans-serif" font-size="48" font-weight="900" fill="#2ea3f2" letter-spacing="1">ENERGY EFFICIENCY</text>

  <!-- Subtitle bar -->
  <rect x="50" y="170" width="400" height="4" fill="#7EBEC5"/>

  <text x="50" y="210" font-family="'Trebuchet MS', sans-serif" font-size="16" fill="#ccc">From Rack Cooling to Liquid Cooling</text>

  <!-- Three bold stat blocks -->
  <!-- Block 1: Air PUE -->
  <g>
    <rect x="50" y="260" width="220" height="160" rx="0" fill="#1a2942"/>
    <rect x="50" y="260" width="220" height="4" fill="#e74c3c"/>
    <text x="160" y="310" font-family="monospace" font-size="44" font-weight="bold" fill="#e74c3c" text-anchor="middle">1.6</text>
    <text x="160" y="340" font-family="'Trebuchet MS', sans-serif" font-size="14" fill="#ccc" text-anchor="middle">PUE — AIR COOLED</text>
    <text x="160" y="370" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">~15-25 kW/rack max</text>
    <text x="160" y="390" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">30-50% facility power</text>
  </g>

  <!-- Block 2: Liquid PUE -->
  <g>
    <rect x="300" y="260" width="220" height="160" rx="0" fill="#1a2942"/>
    <rect x="300" y="260" width="220" height="4" fill="#22c55e"/>
    <text x="410" y="310" font-family="monospace" font-size="44" font-weight="bold" fill="#22c55e" text-anchor="middle">1.1</text>
    <text x="410" y="340" font-family="'Trebuchet MS', sans-serif" font-size="14" fill="#ccc" text-anchor="middle">PUE — LIQUID COOLED</text>
    <text x="410" y="370" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">50-100+ kW/rack</text>
    <text x="410" y="390" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">3-15% facility power</text>
  </g>

  <!-- Block 3: Savings -->
  <g>
    <rect x="550" y="260" width="220" height="160" rx="0" fill="#1a2942"/>
    <rect x="550" y="260" width="220" height="4" fill="#7EBEC5"/>
    <text x="660" y="310" font-family="monospace" font-size="44" font-weight="bold" fill="#7EBEC5" text-anchor="middle">32%</text>
    <text x="660" y="340" font-family="'Trebuchet MS', sans-serif" font-size="14" fill="#ccc" text-anchor="middle">COOLING REDUCTION</text>
    <text x="660" y="370" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">Liquid vs Air</text>
    <text x="660" y="390" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#888" text-anchor="middle">Opex savings</text>
  </g>

  <!-- Bro Woo silhouette at bottom right -->
  <g transform="translate(840,420)">
    <!-- Body silhouette -->
    <rect x="0" y="30" width="80" height="140" rx="8" fill="#2ea3f2" opacity="0.8"/>
    <!-- Head -->
    <circle cx="40" cy="0" r="45" fill="#2ea3f2" opacity="0.8"/>
    <!-- Lightning hair -->
    <path d="M0,-10 L10,-50 L20,-30 L30,-55 L40,-35 L50,-50 L58,-30 L68,-45 L75,-10" fill="#fff" opacity="0.9"/>
    <!-- Glasses (white outline) -->
    <circle cx="25" cy="-2" r="14" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
    <circle cx="55" cy="-2" r="14" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
    <line x1="39" y1="-2" x2="41" y2="-2" stroke="#fff" stroke-width="2.5"/>
    <!-- Collar -->
    <path d="M15,40 L40,65 L65,40" stroke="#fff" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- Quote -->
  <text x="50" y="500" font-family="'Trebuchet MS', serif" font-size="20" fill="#7EBEC5" font-style="italic">"Cooling has become a competitive differentiator — not a</text>
  <text x="50" y="528" font-family="'Trebuchet MS', serif" font-size="20" fill="#7EBEC5" font-style="italic">background facility cost."</text>

  <!-- Source line -->
  <text x="50" y="575" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#666">Sources: Gilbert Held · Making Your Data Center Energy Efficient (2011)  ·  ASHRAE TC09.09  ·  The Green Grid PUE</text>
  <text x="50" y="595" font-family="'Trebuchet MS', sans-serif" font-size="10" fill="#555">XINCA ai  ·  ai.xinca.com</text>
</svg>